name: mobile_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.0.2

  # Core app packages
  provider: ^6.0.5
  http: ^1.2.1

  # Map packages
  flutter_map: ^8.0.0
  latlong2: ^0.9.0
  flutter_map_marker_cluster: ^8.2.2
  flutter_map_tile_caching: ^10.1.1

  # Device & media
  geolocator: ^10.0.0
  image_picker: ^1.0.7
  http_parser: ^4.0.2
  device_info_plus: ^10.1.0
  

  # Voice
  flutter_tts: ^3.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/bicycle.gif
